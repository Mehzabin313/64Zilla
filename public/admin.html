<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: Arial; display:flex; }

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#111;
    color:#fff;
    height:100vh;
    padding:20px;
}
.sidebar button{
    width:100%;
    margin:8px 0;
    padding:10px;
    background:#222;
    color:#fff;
    border:none;
    cursor:pointer;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
    background:#f5f5f5;
}

.stats{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
}

.stats div{
    background:#fff;
    padding:15px;
    border-radius:8px;
}

#content{
    margin-top:20px;
    background:#fff;
    padding:15px;
    border-radius:8px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>ADMIN</h2>

    <button onclick="loadSection('users')">Users</button>
    <button onclick="loadSection('sellers')">Sellers</button>
    <button onclick="loadSection('products')">Products</button>
    <button onclick="loadSection('orders')">Orders</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- STATS -->
    <div class="stats">
        <div>Users: <span id="totalUsers">0</span></div>
        <div>Sellers: <span id="totalSellers">0</span></div>
        <div>Products: <span id="totalProducts">0</span></div>
        <div>Orders: <span id="totalOrders">0</span></div>
    </div>

    <!-- CONTENT -->
    <div id="content">Loading...</div>

    <!-- CHART -->
    <canvas id="chart"></canvas>

</div>

<script src="js/admin.js"></script>

</body>
</html>
