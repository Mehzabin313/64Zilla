<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>64Zilla.com</title>
<link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="User Icon">
        <h2>Sign in</h2>
        <form id="sellerLoginForm">
           <input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            <div class="register">
           <button type="submit">Login</button>
        </div>
           
        </form>
        <div class="register">
            Not registered? <a href="seller-register.html" >Create an account!</a>
        </div>
    </div>
     <script src="js/seller-login.js"></script>
</body>
</html>
