<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
 const BASE_URL = "https://six4zilla.onrender.com";
  const cartDiv = document.getElementById("cartItems");

  function loadCart() {
    cartDiv.innerHTML = "";

    cart.forEach(item => {
      cartDiv.innerHTML += `
        <div class="item">

      <div class="item-left">
        <img src="${BASE_URL}/uploads/${item.image}" alt="${item.name}">

        <div>
          <div class="item-title">${item.name}</div>
          <div class="item-price">৳ ${item.price}</div>
          <div>Qty: ${item.quantity}</div>
        </div>
      </div>

      <div class="item-right">
        ৳ ${item.price * item.quantity}
      </div>

    </div>
    `;
      
    });
  }
  async function placeOrder() {
    const API = "https://six4zilla.onrender.com";
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const payment = document.getElementById("paymentMethod").value.trim();
    const bkash = document.getElementById("bkashNumber").value.trim();

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (!name || !phone || !address) {
      alert("Fill all fields");
      return;
    }

    if (cart.length === 0) {
      alert("Cart empty");
      return;
    }

    const order = {
      customer: { name, phone, address },
      paymentMethod: payment,
      bkashNumber: bkash,

      items: cart.map(item => ({
        productId: item._id || item.productId,
        sellerId: item.sellerId,
        name: item.name,
        price: item.price,
        quantity: item.quantity || 1
      })),

      total: cart.reduce((sum, i) =>
        sum + ((i.price || 0) * (i.quantity || 1)), 0)
    };

    try {

      if (payment === "COD") {

        const res = await fetch("${API}/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(order)
        });

        const data = await res.json();

        if (data.success) {
          alert("Order placed successfully");
          localStorage.removeItem("cart");
          window.location.href = "home.html";
        } else {
          alert("Order failed");
        }

      } else {
        localStorage.setItem("pendingOrder", JSON.stringify(order));
        window.location.href = "payment.html";
      }

    } catch (err) {
      console.log("ORDER ERROR:", err);
    }
  }
</script>
