<!DOCTYPE html>
<html>
<head>
<title>Add Product</title>
<link rel="stylesheet" href="css/add-product.css">
</head>
<body>

<h2>Add Product</h2>

<form id="addProductForm">

<input type="text" id="name" name="name" placeholder="Name" required><br><br>

<input type="text" id="district" name="district" placeholder="District" required><br><br>

<input type="number" id="price" name="price" placeholder="Price" required><br><br>

<input type="text" id="size" name="size" placeholder="Size"><br><br>

<select id="availability" name="availability">
    <option value="instock">In Stock</option>
    <option value="outofstock">Out of Stock</option>
</select><br><br>

<input type="file" id="image" name="image" required><br><br>

<button type="submit">Add Product</button>

</form>

<script src="js/add-product.js"></script>

</body>
</html>
