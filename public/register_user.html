<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>64Zilla.com</title>
</head>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-container {
    width: 350px;
    background: #ffffff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.login-container img {
    width: 80px;
    height: 80px;
    margin-bottom: 10px;
}

.login-container h2 {
    margin-bottom: 15px;
    color: #2e7d32;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #66bb6a;
    box-shadow: 0 0 5px rgba(102,187,106,0.3);
}

button {
    width: 100%;
    padding: 12px;
    background: #43a047;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2e7d32;
}

.options {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-top: 10px;
}

.options a {
    text-decoration: none;
    color: #2e7d32;
}

.register {
    margin-top: 10px;
    font-size: 13px;
}

.register a {
    color: #1b5e20;
    font-weight: bold;
    text-decoration: none;
}

#message {
    margin-top: 10px;
    font-weight: bold;
}
</style>
<body>
    <div class="login-container">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="User Icon">
        <h2>Sign in</h2>
       <form id="registerForm">
        <input type="text" id="username" placeholder="Username" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <button type="submit">Register</button>
    
            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
             <!--<div class="register">
            <a href="seller-login.html" id="seller-register">Register</a>
        </div>-->
        </form>
        <div class="register">
           Already have an account? <a href="login.html">login</a>
        </div>
    </div>
     <script src="login.js"></script>

   
    

    <p id="message"></p>

    <script>
        const form = document.getElementById('registerForm');
        const messageDisplay = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Page reload bondho korar jonno

            // Form theke data neya
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                // Backend API call (Tomar route-e)
                const response = await fetch('https://six4zilla.onrender.com/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.status === 201) {
                    messageDisplay.innerText = "Registration Successful!";
                    messageDisplay.style.color = "green";
                    form.reset(); // Form clear kore deya
                } else {
                    messageDisplay.innerText = "Error: " + JSON.stringify(result);
                    messageDisplay.style.color = "red";
                }
            } catch (error) {
                messageDisplay.innerText = "Server connection failed!";
                messageDisplay.style.color = "red";
            }
        });
    </script>

</body>
</html>
