<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="admin">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Admin</h2>

        <button onclick="loadSection('users')">Users</button>
        <button onclick="loadSection('sellers')">Sellers</button>
        <button onclick="loadSection('products')">Products</button>
        <button onclick="loadSection('orders')">Orders</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- STATS -->
        <div class="stats">
            <div>Total Users: <span id="totalUsers">0</span></div>
            <div>Total Sellers: <span id="totalSellers">0</span></div>
            <div>Total Products: <span id="totalProducts">0</span></div>
            <div>Total Orders: <span id="totalOrders">0</span></div>
        </div>

        <!-- DYNAMIC CONTENT -->
        <div id="content"></div>

        <!-- CHART -->
        <canvas id="chart"></canvas>

    </div>
</div>

<script src="js/admin.js"></script>

</body>
</html>
